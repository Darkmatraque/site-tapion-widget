<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Régie Widget</title>

<!-- Ajout du fichier CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>🎛️ Régie Widget</h2>

<input id="city" placeholder="Entrez une ville">
<br>
<button onclick="update()">Mettre à jour</button>

<div class="quick-buttons">
  <p>Accès rapide :</p>
  <button onclick="quick('Tokyo')">Tokyo</button>
  <button onclick="quick('Paris')">Paris</button>
  <button onclick="quick('New York')">NYC</button>
  <button onclick="quick('Seoul')">Seoul</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6Mhy1YECFxWmZTweUvSO9Xfy2UsJVs",
  authDomain: "widget-layloo.firebaseapp.com",
  databaseURL: "https://widget-layloo-default-rtdb.firebaseio.com",
  projectId: "widget-layloo"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function update() {
  const city = document.getElementById("city").value.trim();

  if (!city) {
    alert("Entrez une ville");
    return;
  }

  db.ref("widget").set({
    city: city
  });
}

function quick(city) {
  db.ref("widget").set({
    city: city
  });
}
</script>

</body>
</html>
