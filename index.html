<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Widget</title>
<link rel="stylesheet" href="style.css">

  
<style>
body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 50px;
}

h2 {
  margin-bottom: 30px;
}

input {
  padding: 10px;
  font-size: 16px;
  width: 220px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #f2a1b3;
  color: black;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.quick-buttons {
  margin-top: 30px;
}

.quick-buttons button {
  margin: 5px;
}
</style>
</head>

<body>

<h2>Dashboard Widget</h2>

<input id="city" placeholder="Entrez une ville">
<br>
<button onclick="update()">Mettre à jour</button>

<div class="quick-buttons">
  <p>Accès rapide :</p>
  <button onclick="quick('Tokyo')">Tokyo</button>
  <button onclick="quick('Paris')">Paris</button>
  <button onclick="quick('New York')">NYC</button>
  <button onclick="quick('Seoul')">Seoul</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6Mhy1YECFxWmZTweUvSO9Xfy2UsJVs",
  authDomain: "widget-layloo.firebaseapp.com",
  databaseURL: "https://widget-layloo-default-rtdb.firebaseio.com",
  projectId: "widget-layloo"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function update() {
  const city = document.getElementById("city").value.trim();

  if (!city) {
    alert("Entrez une ville");
    return;
  }

  db.ref("widget").set({
    city: city
  });
}

function quick(city) {
  db.ref("widget").set({
    city: city
  });
}
</script>

</body>
</html>
